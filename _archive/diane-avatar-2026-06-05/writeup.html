<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Pipeline Writeup — Diane Avatar Project</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      max-width: 760px; margin: 40px auto; padding: 0 24px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 15px; line-height: 1.7; color: #333; background: #fff;
    }
    .back { font-size: 13px; margin-bottom: 24px; display: block; }
    a { color: #1a0dab; } a:visited { color: #681da8; }
    h1 { font-size: 22px; } h2 { font-size: 18px; margin-top: 32px; }
    h3 { font-size: 15px; margin-top: 24px; }
    code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; font-size: 13px; }
    pre { background: #f4f4f4; padding: 14px; border-radius: 4px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    img { max-width: 100%; border: 1px solid #ddd; margin: 8px 0; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #f8f8f8; }
    blockquote { border-left: 3px solid #ccc; margin: 16px 0; padding: 4px 16px; color: #555; }
    hr { border: none; border-top: 1px solid #ccc; margin: 32px 0; }
    .loading { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <a class="back" href="/">← Back to prototypes</a>
  <div id="content"><p class="loading">Loading writeup…</p></div>
  <script>
    fetch('./sprites/02-consistent-2d-poses.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>Failed to load writeup. <a href="./sprites/02-consistent-2d-poses.md">View raw markdown</a></p>';
      });
  </script>
</body>
</html>
